name: Compile W132D Kernel + DTB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu flex bison bc

      - name: Prepare kernel config and compile
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make defconfig
          scripts/config --disable CLK_IMX8MP_AUDIOMIX
          scripts/config --disable CLK_VBATTB
          scripts/config --disable CLK_R9A06G032
          scripts/config --disable CLK_R9A07G043
          scripts/config --disable CLK_R9A07G044
          scripts/config --disable CLK_R9A08G045
          scripts/config --disable CLK_R9A09G011
          scripts/config --disable CLK_R9A09G057
          scripts/config --disable CLK_RZG2L
          scripts/config --disable CLK_RZV2H
          make olddefconfig
          make -j$(nproc) Image dtbs modules

      - name: Package output
        run: |
          mkdir -p output
          cp arch/arm64/boot/Image output/
          cp arch/arm64/boot/dts/rockchip/rk3528-w132d.dtb output/
          cd output && zip -r ../rk3528-w132d-kernel.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rk3528-w132d-kernel
          path: rk3528-w132d-kernel.zip
